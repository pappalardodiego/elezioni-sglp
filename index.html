<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risultati Elezioni Comunali - San Giovanni La Punta</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, Helvetica, sans-serif; background: #f4f4f4; color: #222; padding: 24px; }
    .container { max-width: 1200px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 32px; }
    header h1 { font-size: 34px; margin-bottom: 8px; color: #111; }
    header p { color: #666; font-size: 16px; }
    .status-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 14px; padding: 16px 20px; margin-bottom: 14px; box-shadow: 0 4px 14px rgba(0,0,0,.08); gap: 16px; flex-wrap: wrap; }
    .live-badge { display: inline-flex; align-items: center; gap: 8px; font-weight: bold; color: #c40000; }
    .live-dot { width: 10px; height: 10px; background: #c40000; border-radius: 50%; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
    .refresh-button { border: none; background: #0b5ed7; color: white; font-weight: bold; padding: 10px 16px; border-radius: 10px; cursor: pointer; }
    #statusMessage { text-align: center; color: #777; margin: 0 0 20px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 22px; }
    .candidate-card { background: #fff; border-radius: 18px; overflow: hidden; box-shadow: 0 6px 18px rgba(0,0,0,.10); }
    .candidate-photo { width: 100%; height: 260px; object-fit: cover; background: #ddd; display: block; }
    .candidate-content { padding: 18px; text-align: center; }
    .candidate-name { font-size: 22px; font-weight: bold; margin-bottom: 12px; }
    .votes { font-size: 28px; font-weight: bold; margin-bottom: 4px; }
    .votes-label { font-size: 13px; color: #777; margin-bottom: 14px; }
    .percentage { font-size: 34px; font-weight: bold; color: #0b5ed7; margin-bottom: 12px; }
    .progress-bar { width: 100%; height: 12px; background: #e6e6e6; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; background: #0b5ed7; width: 0%; transition: width .6s ease; }
    .winner { border: 3px solid #f0b400; }
    footer { text-align: center; color: #777; font-size: 13px; margin-top: 30px; }
    @media (max-width: 600px) { body { padding: 14px; } header h1 { font-size: 26px; } .candidate-photo { height: 230px; } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Risultati Elezioni Comunali</h1>
      <p>Comune di San Giovanni La Punta - Scrutinio in tempo reale</p>
    </header>

    <section class="status-bar">
      <div class="live-badge"><span class="live-dot"></span> LIVE</div>
      <div>Sezioni scrutinate: <strong id="sezioni">0 / 0</strong></div>
      <div>Ultimo aggiornamento: <strong id="ultimoAggiornamento">--:--:--</strong></div>
      <button class="refresh-button" id="refreshButton" type="button">Aggiorna dati</button>
    </section>

    <div id="statusMessage">Caricamento dati...</div>
    <main class="grid" id="candidateGrid"></main>
    <footer></footer>
  </div>

  <script>
    const DATA_URL = "dati.json";

    const datiDefault = {
      sezioniScrutinate: 0,
      sezioniTotali: 0,
      candidati: [
        { nome: "Brancato", foto: "brancato.jpeg", voti: 0 },
        { nome: "Trovato", foto: "trovato.jpg", voti: 0 },
        { nome: "Riccobene", foto: "riccobene.jpg", voti: 0 },
        { nome: "Battipaglia", foto: "battipaglia.jpeg", voti: 0 }
      ]
    };

    let electionData = datiDefault;

    function setStatus(message) {
      const status = document.getElementById("statusMessage");
      if (status) status.textContent = message;
    }

    function formatNumber(number) {
      return Number(number || 0).toLocaleString("it-IT");
    }

    function calculateTotalVotes(candidati) {
      return candidati.reduce((totale, candidato) => totale + Number(candidato.voti || 0), 0);
    }

    function getPercentage(voti, totale) {
      if (totale === 0) return 0;
      return Number(voti || 0) / totale * 100;
    }

    function renderElectionData(data) {
      const grid = document.getElementById("candidateGrid");
      const sezioni = document.getElementById("sezioni");
      const ultimoAggiornamento = document.getElementById("ultimoAggiornamento");
      if (!grid || !sezioni || !ultimoAggiornamento) return;

      const totaleVoti = calculateTotalVotes(data.candidati);
      const maxVoti = Math.max(...data.candidati.map(candidato => Number(candidato.voti || 0)));

      sezioni.textContent = `${data.sezioniScrutinate || 0} / ${data.sezioniTotali || 0}`;
      ultimoAggiornamento.textContent = new Date().toLocaleTimeString("it-IT");
      grid.innerHTML = "";

      data.candidati
        .slice()
        .sort((a, b) => Number(b.voti || 0) - Number(a.voti || 0))
        .forEach(candidato => {
          const percentuale = getPercentage(candidato.voti, totaleVoti);
          const isWinner = Number(candidato.voti || 0) === maxVoti && maxVoti > 0;
          const fallbackFoto = "https://via.placeholder.com/600x700?text=" + encodeURIComponent(candidato.nome);

          const card = document.createElement("article");
          card.className = "candidate-card" + (isWinner ? " winner" : "");
          card.innerHTML =
            '<img class="candidate-photo" src="' + candidato.foto + '?v=' + Date.now() + '" alt="Foto di ' + candidato.nome + '">' +
            '<div class="candidate-content">' +
            '<div class="candidate-name">' + candidato.nome + '</div>' +
            '<div class="votes">' + formatNumber(candidato.voti) + '</div>' +
            '<div class="votes-label">voti</div>' +
            '<div class="percentage">' + percentuale.toFixed(2).replace(".", ",") + '%</div>' +
            '<div class="progress-bar"><div class="progress-fill" style="width: ' + percentuale + '%"></div></div>' +
            '</div>';

          const img = card.querySelector("img");
          img.onerror = function () {
            this.src = fallbackFoto;
          };

          grid.appendChild(card);
        });
    }

    async function caricaDati() {
      try {
        setStatus("Aggiornamento dati in corso...");

        const response = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
        if (!response.ok) throw new Error("File dati.json non trovato o non leggibile");

        const data = await response.json();
        if (!data.candidati || !Array.isArray(data.candidati)) throw new Error("Formato dati.json non valido");

        electionData = data;
        renderElectionData(electionData);
        setStatus("Dati aggiornati alle " + new Date().toLocaleTimeString("it-IT"));
      } catch (error) {
        console.error(error);
        renderElectionData(electionData);
        setStatus("Errore: " + error.message + ". Sto mostrando gli ultimi dati disponibili.");
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      renderElectionData(electionData);

      const button = document.getElementById("refreshButton");
      if (button) button.addEventListener("click", caricaDati);

      caricaDati();
      setInterval(caricaDati, 10000);
    });
  </script>
</body>
</html>
